  <rect x="302" y="246" width="92" height="8" fill="#111111" opacity="0.55"/>
  <rect x="302" y="264" width="92" height="8" fill="#111111" opacity="0.55"/>
  <rect x="302" y="282" width="92" height="8" fill="#111111" opacity="0.55"/>

