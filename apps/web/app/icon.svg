  <rect x="24" y="24" width="464" height="464" rx="18" stroke="#111111" stroke-width="8"/>

  <!-- Newspaper Body -->
  <rect x="92" y="92" width="328" height="328" fill="#F8F1E1" stroke="#111111" stroke-width="10"/>

